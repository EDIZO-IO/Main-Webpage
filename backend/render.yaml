services:
  # Backend Service
  - type: web
    name: edizo-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DB_HOST
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: ADMIN_URL
        sync: false

  # Database (MySQL)
  - type: pserv
    name: edizo-database
    databaseName: edizo_db
    plan: free
    ipAllowList: []
